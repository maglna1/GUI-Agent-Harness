# m3_fast：M3 省调用骨架（原名 m3_best）。
# 5 轮迭代 + 只在最后一轮复查（crop_check_mode=last_only）+ 复查拒绝时 widen
# 回退到更宽的框（不从头重裁、不打转）+ 图限 max_side=3072（修 MiniMax HTTP400）。
# 相对 quality_8round（8 轮 + 每轮复查）把每样本 LLM 调用次数从 ~16 降到 ~6，
# 适合 M3 这种单次推理慢的模型。
# 注意：本配置未开 candidate_sort（消融里唯一确认有正收益的开关）。
#       要 M3 上的完整最优，用 m3_optimal.yaml（= 本骨架 + candidate_sort=relevance）。
# 跑法： python run_screenspot_pro.py --config benchmarks/screenspot_pro/configs/m3_fast.yaml ...

locator_mode: iterative_zoom

# 上下文 / 缓存
context_mode: single
accumulate_images: false

# 迭代轮数（5，比 known_good 的 8 少）
iterative_rounds: 5

# 缩放（沿用新策略：小图放大、大图不缩）
iterative_scale_mode: preserve
iterative_max_side: 3072
iterative_max_scale: 5
iterative_min_short_side: 512
iterative_min_scale: 1.0
iterative_final_max_side: 3072
iterative_final_max_scale: 8
iterative_final_min_short_side: 640
iterative_final_min_scale: 1.0
iterative_max_area_pct: 0
iterative_padding_pct: 8
iterative_min_width: 240
iterative_min_height: 80
iterative_final_candidates: 80
iterative_stage1_min_area_pct: 20
iterative_stage2_min_area_pct: 8

# 复查策略（关键优化点）
enable_staged_crop: true
enable_crop_check: true
crop_check_mode: last_only           # 只在最后一轮复查,省调用
crop_check_reject_mode: widen        # 复查拒绝时退回更宽的框(不从头,避免打转)
enable_crop_retry: true
crop_retry_limit: 3
enable_final_candidate_detect: true
enable_final_recheck: false          # 复查已由 crop_check 末轮负责，final recheck 关
enable_final_verify: false
enable_final_recrop: true
final_recrop_limit: 0
enable_legacy_pipeline: false

# prompt 布局（沿用缓存优化）
iterative_prompt_layout: cache

runtime_timeout_s: 180
